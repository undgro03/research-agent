# Lab RSS Feeds, Blog URLs, and Source Registry
# Used by Monitor agent for daily collection

rss_feeds:
  # Research Labs
  - name: "Google AI Blog"
    url: "https://blog.research.google/feeds/posts/default"
    tags: ["google", "research"]

  - name: "Google DeepMind Blog"
    url: "https://deepmind.google/blog/rss.xml"
    tags: ["deepmind", "research"]

  - name: "Meta AI Research"
    url: "https://ai.meta.com/blog/rss/"
    tags: ["meta", "fair"]

  - name: "OpenAI Blog"
    url: "https://openai.com/blog/rss.xml"
    tags: ["openai"]

  - name: "Hugging Face Blog"
    url: "https://huggingface.co/blog/feed.xml"
    tags: ["huggingface", "lerobot"]

  - name: "NVIDIA Developer Blog - Robotics"
    url: "https://developer.nvidia.com/blog/category/robotics/feed/"
    tags: ["nvidia", "isaac"]

  - name: "Berkeley AI Research Blog"
    url: "https://bair.berkeley.edu/blog/feed.xml"
    tags: ["berkeley", "bair"]

  - name: "CMU ML Blog"
    url: "https://blog.ml.cmu.edu/feed/"
    tags: ["cmu"]

  - name: "MIT News - CSAIL"
    url: "https://news.mit.edu/rss/topic/csail-research-highlights"
    tags: ["mit", "csail"]

  # Companies / Ventures
  - name: "Boston Dynamics Blog"
    url: "https://bostondynamics.com/blog/feed/"
    tags: ["boston-dynamics"]

  - name: "Physical Intelligence Blog"
    url: "https://www.physicalintelligence.company/blog/rss"
    tags: ["pi", "physical-intelligence"]

  - name: "Figure AI News"
    url: "https://www.figure.ai/news/rss"
    tags: ["figure-ai"]

  - name: "1X Technologies Blog"
    url: "https://www.1x.tech/blog/rss"
    tags: ["1x"]

  - name: "Covariant (Generalist AI) Blog"
    url: "https://covariant.ai/insights/feed/"
    tags: ["covariant", "generalist"]

  - name: "Agility Robotics News"
    url: "https://agilityrobotics.com/news/rss"
    tags: ["agility"]

