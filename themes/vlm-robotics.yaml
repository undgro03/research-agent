      - "robot foundation model"
      - "generalist robot policy"
      - "RT-2"
      - "OpenVLA"
      - "pi0"
      - "Octo"
      - "SayCan"
      - "PaLM-E"
      - "language grounding robot"
      - "multimodal robot policy"
      - "instruction following robot"
      - "CLIP robot"
      - "RoboCat"
      - "RoboFlamingo"
      - "GR-1"
      - "RoboVLMs"
    max_results: 80
