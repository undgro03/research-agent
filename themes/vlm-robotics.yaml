extends: _base

name: "VLM × Robotics"
slug: "vlm-robotics"
description: >
  Vision-Language Models applied to robotics control and planning.
  Covers VLA (Vision-Language-Action), language-conditioned policies,
  RT-2, OpenVLA, pi0, Octo, and grounding for robot action.

