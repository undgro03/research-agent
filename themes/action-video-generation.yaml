extends: _base

name: "Action Conditioned Video Generation"
slug: "action-video-generation"
description: >
  Video generation models conditioned on actions, for robot learning,
  world model training, and data augmentation. Covers action-conditioned
  diffusion models, video prediction for planning, and video as robot policy.

sources:
  arxiv:
    categories:
      - "cs.CV"
      - "cs.RO"
      - "cs.LG"
    keywords:
      - "action conditioned video generation"
      - "action conditioned video prediction"
      - "video generation robot"
      - "video world model"
      - "robot video prediction"
      - "diffusion video robot"
      - "video as policy"
      - "video generation planning"
      - "generative video model robot"
      - "action video diffusion"
      - "UniSim"
      - "IRASim"
      - "RoboDreamer"
      - "SuSIE"
      - "video pretraining robot"
      - "future frame prediction robot"
    max_results: 60
    lookback_days: 3

  twitter:
    keywords:
      - "action conditioned video"
      - "video generation robot"
      - "video world model robot"
      - "robot video prediction"
    accounts_to_track:
      - "yilun_du"
      - "svlevine"
      - "chelseabfinn"
      - "GoogleDeepMind"
      - "pabbeel"

