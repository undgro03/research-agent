extends: _base

name: "World Action Models"
slug: "world-action-models"
description: >
  World Models combined with action/policy learning for robotics.
  Covers predictive world models, latent dynamics, model-based RL,
  and world models as robot planners or simulators.

sources:
  arxiv:
    categories:
      - "cs.RO"
      - "cs.LG"
      - "cs.AI"
      - "cs.CV"
    keywords:
      - "world model robot"
      - "world action model"
      - "model-based reinforcement learning robot"
      - "latent world model"
      - "predictive model robot"
      - "video world model robot"
      - "MBRL robotics"
      - "Dreamer robotics"
      - "neural world model"
      - "action-conditioned prediction"
      - "robot imagination"
      - "model predictive control learning"
      - "Genie world model"
      - "UniSim world model"
      - "IRASim"
    max_results: 60
    lookback_days: 3

  twitter:
    keywords:
      - "world model robot"
      - "world action model"
      - "model-based RL robot"
      - "robot world model"
    accounts_to_track:
      - "yilun_du"
      - "svlevine"
      - "pabbeel"
      - "GoogleDeepMind"
      - "ylecun"

researchers:
  focus:
    - "Yilun Du"
    - "Sergey Levine"
    - "Danijar Hafner"
    - "Pieter Abbeel"
    - "Yann LeCun"
