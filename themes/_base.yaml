technical_depth: medium     # low | medium | high | expert
report_format: structured   # structured | executive | technical

mcp_servers:
  - arxiv
  - semantic_scholar
  - brave_search
  - sqlite

alert_thresholds:
  citation_velocity: 20     # citations/day
  twitter_engagement: 500   # likes + retweets
  lab_paper: true           # always alert for watched labs

report_sections:
  - executive_summary
  - key_papers
  - trending_topics
  - lab_updates
  - notable_researchers
  - open_problems
  - weekly_delta
