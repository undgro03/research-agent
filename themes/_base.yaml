# Base theme profile — inherited by all themes
version: "1"

sources:
  arxiv:
    enabled: true
    max_results: 50
    categories:
      - "cs.RO"   # Robotics
      - "cs.AI"   # Artificial Intelligence
      - "cs.LG"   # Machine Learning
      - "cs.CV"   # Computer Vision
    lookback_days: 1

  twitter:
    enabled: true
    max_results: 100
    lookback_hours: 24

  semantic_scholar:
    enabled: true
    min_citation_count: 0

  rss_feeds:
    enabled: true

  web_search:
    enabled: true

