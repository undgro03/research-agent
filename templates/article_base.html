<!DOCTYPE html>
<html lang="{{ lang | default('ja') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — Embodied AI Radar</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #242736;
      --border:    #2e3248;
      --accent:    #6c8ef5;
      --accent2:   #a78bfa;
      --green:     #34d399;
      --yellow:    #fbbf24;
      --text:      #e2e8f0;
      --text-muted:#94a3b8;
      --text-dim:  #64748b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.75;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Article layout */
    .article-wrap { max-width: 820px; margin: 0 auto; padding: 40px 24px 80px; }

    /* Breadcrumb */
    .breadcrumb {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 32px;
    }
    .breadcrumb a { color: var(--accent); }
    .breadcrumb span { margin: 0 6px; }

    /* Article header */
    .article-header { margin-bottom: 40px; }
    .article-theme-tag {
      display: inline-block;
      background: var(--accent);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .article-title {
      font-size: 30px;
      font-weight: 800;
      line-height: 1.25;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }
    .article-title-en {
      font-size: 18px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .article-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--text-dim);
    }
    .article-meta .dot { color: var(--border); }

    /* Body */
    .article-body h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin: 40px 0 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .article-body h3 {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      margin: 28px 0 10px;
    }
    .article-body p {
      font-size: 15px;
      color: var(--text);
      margin-bottom: 16px;
    }
    .article-body ul, .article-body ol {
      padding-left: 24px;
      margin-bottom: 16px;
    }
    .article-body li {
      font-size: 15px;
      margin-bottom: 6px;
    }

    /* Paper reference box */
    .paper-ref {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 14px 18px;
      margin: 16px 0;
    }
    .paper-ref .paper-ref-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .paper-ref .paper-ref-authors {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .paper-ref .paper-ref-abstract {
      font-size: 13px;
      color: var(--text-dim);
    }

    /* Mermaid */
    .diagram-container {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      margin: 28px 0;
    }
    .diagram-caption {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 12px;
    }
    .mermaid { display: flex; justify-content: center; }

    /* Key points box */
    .keypoints {
      background: linear-gradient(135deg, rgba(108,142,245,0.08), rgba(167,139,250,0.05));
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 20px 24px;
      margin: 24px 0;
    }
    .keypoints h4 {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .keypoints ul { list-style: none; padding: 0; }
    .keypoints li {
      padding: 6px 0;
      padding-left: 18px;
      position: relative;
      font-size: 14px;
      color: var(--text);
    }
    .keypoints li::before {
      content: "◆";
      color: var(--accent);
      font-size: 8px;
      position: absolute;
      left: 0;
      top: 9px;
    }

    /* Future directions */
    .future-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px 28px;
      margin-top: 40px;
    }
    .future-section h2 {
      border: none;
      margin-top: 0;
      color: var(--accent2);
    }

    /* Back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-dim);
      font-size: 13px;
      margin-top: 48px;
    }
    .back-link:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="article-wrap">
    <div class="breadcrumb">
      <a href="../../daily/{{ date }}/report_ja.html">Radar</a>
      <span>›</span>
      <a href="#">{{ theme_name }}</a>
      <span>›</span>
      {{ title }}
    </div>

    <header class="article-header">
      <div class="article-theme-tag">{{ theme_name }}</div>
      <h1 class="article-title">{{ title }}</h1>
      <div class="article-title-en">{{ title_en }}</div>
      <div class="article-meta">
        <span>{{ date }}</span>
        <span class="dot">·</span>
        <span>Embodied AI Radar</span>
        <span class="dot">·</span>
        <span>{{ read_time | default('5 min read') }}</span>
      </div>
    </header>

    <div class="article-body">
      {{ content }}
    </div>

    <a href="../../daily/{{ date }}/report_ja.html" class="back-link">
      ← 本日のレポートに戻る / Back to today's report
    </a>
  </div>

  <script>
    mermaid.initialize({
      startOnLoad: true,
      theme: 'dark',
      themeVariables: {
        primaryColor: '#6c8ef5',
        primaryTextColor: '#e2e8f0',
        primaryBorderColor: '#2e3248',
        lineColor: '#6c8ef5',
        secondaryColor: '#242736',
        background: '#0f1117',
        mainBkg: '#1a1d27',
      }
    });
  </script>
</body>
</html>
